name: Daglig oppdatering av geopolitisk modell

on:
  schedule:
    # Kl. 06:05 Oslo-tid (UTC+2 sommer = 04:05 UTC)
    - cron: '5 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sjekk ut repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Sett opp Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'

      - name: Vis briefs-mappe
        run: |
          echo "Leter etter brief for $(date +%Y-%m-%d)..."
          ls briefs/ 2>/dev/null || echo "Ingen briefs ennaa"

      - name: Kjor byggeskript
        run: python scripts/build.py

      - name: Commit og push oppdatert modell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/.price_cache.json 2>/dev/null || git add index.html
          git diff --staged --quiet || git commit -m "Daglig oppdatering $(date +%Y-%m-%d)" && git push
