name: Daglig oppdatering av geopolitisk modell

on:
  schedule:
    - cron: '5 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sjekk ut repository
        uses: actions/checkout@v4

      - name: Verifiser index.html
        run: |
          echo "index.html storrelse: $(wc -c < index.html) bytes"
          echo "Antall paneler: $(grep -c 'class=\"panel\"' index.html)"

      - name: Ingen endringer nodvendig
        run: echo "index.html er allerede oppdatert via push.bat"
